services:
  watchdog-supervisor:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    image: watchdog-sim:dev
    command: ["/usr/local/bin/watchdog-supervisor", "-config", "/configs/watchdog-supervisor.docker-sim.json"]
    expose:
      - "9109"
    volumes:
      - ../../configs:/configs:ro
      - watchdog-run:/run/watchdog
      - watchdog-var:/var/lib/watchdog

  watchdog:
    image: watchdog-sim:dev
    depends_on:
      - watchdog-supervisor
    command: ["/usr/local/bin/watchdog", "-config", "/configs/watchdog.docker-sim.json"]
    expose:
      - "9108"
    volumes:
      - ../../configs:/configs:ro
      - watchdog-run:/run/watchdog
      - watchdog-var:/var/lib/watchdog

  planner-sim:
    image: watchdog-sim:dev
    depends_on:
      - watchdog
    command:
      - "/usr/local/bin/watchdog-sim-module"
      - "-socket"
      - "/run/watchdog/module.sock"
      - "-source-id"
      - "planner"
      - "-severity"
      - "warn"
      - "-reason"
      - "deadline miss"
      - "-interval"
      - "1s"
      - "-stale-after"
      - "1500ms"
      - "-count"
      - "5"
      - "-metric"
      - "deadline_miss_ms=18.5"
      - "-label"
      - "process=planner_main"
    volumes:
      - watchdog-run:/run/watchdog

  watchdogctl:
    image: watchdog-sim:dev
    profiles: ["tools"]
    depends_on:
      - watchdog-supervisor
    command: ["/usr/local/bin/watchdogctl", "status", "-config", "/configs/watchdog-supervisor.docker-sim.json"]
    volumes:
      - ../../configs:/configs:ro
      - watchdog-var:/var/lib/watchdog

  prometheus:
    profiles: ["observability"]
    image: prom/prometheus:v2.53.4
    depends_on:
      - watchdog
      - watchdog-supervisor
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    ports:
      - "9091:9090"
    volumes:
      - ../observability/prometheus/prometheus.docker-sim.yml:/etc/prometheus/prometheus.yml:ro

  grafana:
    profiles: ["observability"]
    image: grafana/grafana:11.1.3
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
    ports:
      - "3300:3000"
    volumes:
      - ../observability/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ../observability/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../observability/grafana/dashboards:/var/lib/grafana/dashboards:ro

volumes:
  watchdog-run:
  watchdog-var:
